# Conversion to YAML from Properties formar report
# Warnings:
# - The yaml file had comments which are lost in the refactoring!
spring:
  application:
    name: order
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/order_db?createDatabaseIfNotExist=true
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
server:
  port: 8084
  servlet:
    context-path: /api
logging:
  level:
    root: INFO
    cl:
      gestion:
        ventas:
          order: DEBUG
  file:
    name: logs/order-service.log
jwt:
  secret: 46238dr3r67246y423784rt687342rys832q47rt
services:
  cart:
    baseUrl: http://${CART_HOST:localhost}:8082/api/v1/carts
  inventory:
    baseUrl: http://${INVENTORY_HOST:localhost}:8083/api/v1/inventories
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
