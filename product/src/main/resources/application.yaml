spring:
  profiles:
    active: local
  application:
    name: product
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  port: 8085
  servlet:
    context-path: /api

services:
  category:
    baseUrl: http://${CATEGORY_HOST:localhost}:8086/api/v1/category

logging:
  level:
    root: INFO
    "[cl.gestion.ventas.inventory]": DEBUG

  file:
    name: logs/product-service.log

jwt:
  secret: 46238dr3r67246y423784rt687342rys832q47rt

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
allowed:
  origin: ${ALLOWED_ORIGIN:http://localhost:8080}
