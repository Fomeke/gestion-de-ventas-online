spring:
  datasource:
    url: jdbc:mysql://mysql:3306/product_db?createDatabaseIfNotExist=true
    username: root
    password: ""

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}

services:
  category:
    baseUrl: http://category/api/v1/category

allowed:
  origin: ${ALLOWED_ORIGIN:http://localhost:8080}