spring:

    application:
        name: payment

    datasource:
        url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/payment_db?createDatabaseIfNotExist=true
        username: root
        password:
        driver-class-name: com.mysql.cj.jdbc.Driver

    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
    
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        open-in-view: false
    
server:
    port: 8089
    servlet:
        context-path: /api

services:
    order:
        baseUrl: http://${ORDER_HOST:localhost}:8084

logging:
  level:
    root: INFO
    "[cl.gestion.ventas.inventory]": DEBUG

  file:
    name: logs/payment-service.log

