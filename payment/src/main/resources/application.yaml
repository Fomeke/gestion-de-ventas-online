spring:
  profiles:
    active: local
  application:
    name: payment
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  port: 8089
  servlet:
    context-path: /api

services:
  order:
    baseUrl: http://${ORDER_HOST:localhost}:8084

logging:
  level:
    root: INFO
    "[cl.gestion.ventas.inventory]": DEBUG

  file:
    name: logs/payment-service.log

jwt:
  secret: 46238dr3r67246y423784rt687342rys832q47rt

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
