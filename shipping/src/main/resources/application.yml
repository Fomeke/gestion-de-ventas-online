# Conversion to YAML from Properties formar report
# Warnings:
# - The yaml file had comments which are lost in the refactoring!
spring:
  profiles:
    active: local
  application:
    name: shipping

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
server:
  port: 8081
  servlet:
    context-path: /api
logging:
  level:
    root: INFO
    cl:
      gestion:
        ventas:
          shipping: DEBUG
  file:
    name: logs/shipment-service.log

jwt:
  secret: 46238dr3r67246y423784rt687342rys832q47rt
services:
  order:
    baseUrl: http://${ORDER_HOST:localhost}:8084/api/v1/orders
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
allowed:
  origin: ${ALLOWED_ORIGIN:http://localhost:8080}
