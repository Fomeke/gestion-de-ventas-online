      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://eureka-server:8761/eureka/
    networks:
      - networksita
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-notification:
