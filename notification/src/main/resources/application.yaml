spring:

    application:
        name: notification

    datasource:
        url: jdbc:mysql://localhost:3306/notification_db
        username: root
        password:
        driver-class-name: com.mysql.cj.jdbc.Driver

    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: true
    
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        open-in-view: false
    
server:
    port: 8088
    servlet:
        context-path: /api

services:
    order:
        baseUrl: http://localhost:8084
    auth:
        baseUrl: http://localhost:8090

logging:
  level:
    root: INFO
    "[cl.gestion.ventas.inventory]": DEBUG

  file:
    name: logs/notification-service.log

jwt:
