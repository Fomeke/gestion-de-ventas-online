spring:
  application:
    name: auth
  datasource:
    url: jdbc:mysql://mysql:3306/auth_db?createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
eureka:
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP:true}
allowed:
  origin: ${ALLOWED_ORIGIN:http://localhost:8080}