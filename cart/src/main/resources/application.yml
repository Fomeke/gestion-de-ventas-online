spring:
  profiles:
    active: local
  application:
    name: cart
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
server:
  port: 8082
  servlet:
    context-path: /api
logging:
  level:
    root: INFO
    cl:
      gestion:
        ventas:
          cart: DEBUG
  file:
    name: logs/cart-service.log
jwt:
  secret: 46238dr3r67246y423784rt687342rys832q47rt
services:
  product:
    baseUrl: http://${PRODUCT_HOST:localhost}:8085/api/v1/product
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
