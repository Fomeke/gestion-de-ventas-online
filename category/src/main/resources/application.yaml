spring:
  application:
    name: category
  profiles:
    active: local
  flyway:
    enabled: true
    locations: classpath:db/migrations
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

server:
  port: 8086
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    "[cl.gestion.ventas.category]": DEBUG

  file:
    name: logs/category-service.log

jwt:
  secret: 46238dr3r67246y423784rt687342rys832q47rt
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
